# Cluster identity
cluster_name: hpc-semi-lab
domain_name: lab.local
timezone: Asia/Ho_Chi_Minh

# Admin
admin_user: hpcadmin
admin_group: hpcadmins

# OS Configuration
os_packages:
  - git
  - vim
  - curl
  - wget
  - htop
  - net-tools
  - openssh-clients
  - rsync
  - python3-pexpect
  - xorg-x11-xauth
  - xterm

# Network
dns_servers:
  - 8.8.8.8
  - 1.1.1.1

# Cluster network (used for NFS exports, etc.)
cluster_network_cidr: 192.168.56.0/24

# Storage
nfs_home: /home
nfs_proj: /proj
nfs_soft: /soft

# Slurm
# hpc-lab in lowercase to avoid slurmdb mismatch
slurm_cluster_name: hpc-lab
slurm_state_dir: /var/spool/slurm/ctld
slurm_log_dir: /var/log/slurm

# Slurm common
# OpenHPC 2.x cho RHEL 8 derivatives (Rocky/AlmaLinux el8).
# RPM nằm tại repos.openhpc.community
slurm_ohpc_release_url: "https://repos.openhpc.community/OpenHPC/2/EL_8/x86_64/ohpc-release-2-1.el8.x86_64.rpm"
slurm_version: "23.02"
slurm_packages:
  - munge
  - munge-libs
  - slurm-ohpc
  - slurm-perlapi-ohpc
  - slurm-contribs-ohpc

munge_key_path: /etc/munge/munge.key
munge_user: munge
munge_group: munge

slurm_user: slurm
slurm_group: slurm
slurm_uid: 401
slurm_gid: 401

slurm_config_dir: /etc/slurm
slurm_spool_dir: /var/spool/slurm
slurm_slurmd_spool_dir: "{{ slurm_spool_dir }}/d"
slurm_run_dir: /var/run/slurm

slurm_control_machine: head01
slurm_control_addr: "{{ hostvars['head01']['ansible_host'] }}"

slurm_auth_type: auth/munge
slurm_crypto_type: crypto/munge

slurm_accounting_storage_type: accounting_storage/slurmdbd
slurm_accounting_storage_host: "{{ slurm_control_machine }}"
slurm_accounting_storage_port: 6819

slurm_scheduler_type: sched/backfill
slurm_select_type: select/cons_tres
slurm_select_type_parameters: CR_Core_Memory
slurm_slurmd_parameters: config_overrides

slurm_slurmctld_port: 6817
slurm_slurmd_port: 6818
slurm_slurmdbd_port: 6819

slurm_slurmctld_timeout: 300
slurm_slurmd_timeout: 300
slurm_inactive_limit: 0
slurm_min_job_age: 300
slurm_kill_wait: 30
slurm_wait_time: 0

slurm_slurmctld_debug: info
slurm_slurmd_debug: info
slurm_slurmctld_logfile: "{{ slurm_log_dir }}/slurmctld.log"
slurm_slurmd_logfile: "{{ slurm_log_dir }}/slurmd.log"

slurm_complete_wait: 0
slurm_return_to_service: 2
slurm_max_job_count: 10000
slurm_max_array_size: 1000

slurm_compute_nodes:
  - name: compute01
    addr: "{{ hostvars['compute01']['ansible_host'] }}"
    cpus: "{{ hostvars['compute01']['slurm_cpu_count'] | default(2) }}"
    memory: "{{ hostvars['compute01']['slurm_real_memory'] | default(4096) }}"
    state: UNKNOWN
  - name: compute02
    addr: "{{ hostvars['compute02']['ansible_host'] }}"
    cpus: "{{ hostvars['compute02']['slurm_cpu_count'] | default(2) }}"
    memory: "{{ hostvars['compute02']['slurm_real_memory'] | default(4096) }}"
    state: UNKNOWN

slurm_partitions:
  - name: tiny
    nodes: "compute[01-02]"
    default: "NO"
    max_time: "1:00:00"
    MaxCPUsPerNode: 4
    MaxMemPerCPU: 4096
    DefMemPerCPU: 2048
    state: UP
    max_nodes: 2
  - name: small
    nodes: "compute[01-02]"
    default: "YES"
    max_time: "4:00:00"
    MaxCPUsPerNode: 8
    MaxMemPerCPU: 4096
    DefMemPerCPU: 2048
    state: UP
    max_nodes: 2
  - name: medium
    nodes: "compute[01-02]"
    default: "NO"
    max_time: "12:00:00"
    MaxCPUsPerNode: 16
    MaxMemPerCPU: 4096
    DefMemPerCPU: 2048
    state: UP
    max_nodes: 2
  - name: large
    nodes: "compute[01-02]"
    default: "NO"
    max_time: "24:00:00"
    MaxCPUsPerNode: 32
    MaxMemPerCPU: 4096
    DefMemPerCPU: 2048
    state: UP
    max_nodes: 2
  - name: infinite
    nodes: "compute[01-02]"
    default: "NO"
    max_time: "INFINITE"
    AllowGroups: "g_lec,hpcadmins"
    state: UP
    max_nodes: 2

# Slurm controller
slurm_controller_packages:
  - slurm-slurmctld-ohpc
  - slurm-slurmdbd-ohpc
  - mariadb-server
  - mariadb
  - python3-PyMySQL

slurm_db_name: slurm_acct_db
slurm_db_user: slurm
slurm_db_host: localhost
slurm_db_port: 3306

slurmdbd_auth_type: "{{ slurm_auth_type }}"
slurmdbd_host: localhost
slurmdbd_port: "{{ slurm_slurmdbd_port }}"
slurmdbd_debug: info
slurmdbd_logfile: "{{ slurm_log_dir }}/slurmdbd.log"
slurmdbd_pidfile: "{{ slurm_run_dir }}/slurmdbd.pid"
slurmdbd_archive_events: "no"
slurmdbd_archive_jobs: "no"
slurmdbd_archive_steps: "no"
slurmdbd_purge_event: 12months
slurmdbd_purge_job: 12months
slurmdbd_purge_step: 1month

slurm_accounts:
  - name: g_lec
    description: "Lecturers/Teachers Account"
    organization: "{{ cluster_name }}"
  - name: g_stu
    description: "Students Account"
    organization: "{{ cluster_name }}"
  - name: g_guest
    description: "Guest Users Account"
    organization: "{{ cluster_name }}"

# Slurm worker
slurm_worker_packages:
  - slurm-slurmd-ohpc
slurmd_debug: info
slurmd_logfile: "{{ slurm_log_dir }}/slurmd.log"
slurmd_spool_dir: "{{ slurm_slurmd_spool_dir }}"

# LDAP
ldap_domain: "{{ domain_name }}"
ldap_base_dn: "dc={{ ldap_domain.split('.') | join(',dc=') }}"

ldap_server_host: "head01.{{ domain_name }}"
ldap_port: 389
ldap_secure_port: 636
ldap_uri: "ldap://{{ ldap_server_host }}"
ldap_server_uri: "ldap://127.0.0.1:{{ ldap_port }}"

ldap_ds_instance: instance
ldap_directory_manager_dn: "cn=Directory Manager"

ldap_bind_dn: "cn=admin,{{ ldap_base_dn }}"

ldap_user_base: "ou=people,{{ ldap_base_dn }}"
ldap_group_base: "ou=groups,{{ ldap_base_dn }}"

# Scoped service account — chỉ dùng cho create/delete-hpc-user.sh
# Quyền giới hạn: write ou=people, write memberUid trong ou=groups
# KHÔNG dùng Directory Manager cho user scripts
ldap_useradmin_dn: "cn=hpc-useradmin,{{ ldap_base_dn }}"

# UID counter — monotonic, không bao giờ tái sử dụng UID đã xóa
hpc_uid_counter_path: /etc/hpc/uid-next
identity_ldap_runtime_secrets_path: /etc/hpc/user-management-secrets.env

ldap_id_use_start_tls: true          # StartTLS: mã hóa kết nối LDAP trên port 389
ldap_tls_reqcert: allow              # Chấp nhận self-signed cert do 389-ds tự tạo
ldap_ssh_public_key_attr: sshPublicKey

ldap_test_group: hpc-users
ldap_test_group_gid: 20000

ldap_test_user: hpc.test
ldap_test_user_uid: 20000
ldap_test_user_gid: "{{ ldap_test_group_gid }}"
ldap_test_user_gecos: "HPC Test User"
ldap_test_user_home: "/home/{{ ldap_test_user }}"
ldap_test_user_shell: /bin/bash
ldap_test_user_ssh_public_key: ""

# SSH
ssh_port: 22

# Security
# selinux_state: mặc định enforcing cho toàn cụm.
#   Ngoại lệ → group_vars/compute.yml: permissive (tránh vỡ Slurm jobs).
selinux_state: permissive

# sssd_ldap_access_filter: giới hạn PAM login chỉ cho HPC users (uidNumber >= 10000).
#   Ngoại lệ → group_vars/head.yml: "(uidNumber<=0)" (block toàn bộ LDAP user khỏi head01).
sssd_ldap_access_filter: "(uidNumber>=10000)"

# Monitoring
node_exporter_port: 9100
slurm_exporter_port: 9341

# User Groups Configuration
user_groups:
  - name: g_lec
    gid: 10001
    description: "Lecturers/Teachers Group"
    sudo_access: false
    login_nodes: ['login']
    login_cpu: 8
    login_mem_gb: 16
    compute_access: true
  - name: g_stu
    gid: 10002
    description: "Students Group"
    sudo_access: false
    login_nodes: ['login']
    login_cpu: 4
    login_mem_gb: 8
    compute_access: true
  - name: g_guest
    gid: 10003
    description: "Guest Users Group"
    sudo_access: false
    login_nodes: ['login']
    login_cpu: 2
    login_mem_gb: 4
    compute_access: false

# Slurm account mapping for LDAP users
slurm_user_account_mappings:
  - user: hpc.test
    account: g_stu
