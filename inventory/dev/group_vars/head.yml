slurm_node_type: head

# SSSD: block toàn bộ LDAP user khỏi đăng nhập trực tiếp vào head01.
# Admin (hpcadmin) là local account — không bị ảnh hưởng bởi SSSD access filter.
sssd_ldap_access_filter: "(uidNumber<=0)"

# Slurm Controller
slurm_dbd_host: "localhost"
slurm_dbd_port: 6819

# NFS Server (Ko bật ở head)
nfs_server_enabled: false

# NFS mount points (NFSv3 - Head is an NFS client)
# NOTE: Không mount home ở head tránh conflict với local home của hpcadmin (uid 1000).
nfs_mounts:
  - path: "{{ nfs_proj }}"
    server: storage01
    opts: "rw,hard,intr,nfsvers=3,tcp,rsize=1048576,wsize=1048576"
  - path: "{{ nfs_soft }}"
    server: storage01
    opts: "ro,hard,intr,nfsvers=3,tcp,rsize=1048576,wsize=1048576"

# Monitoring
prometheus_port: 9090
grafana_port: 3000
node_exporter_port: 9100
prometheus_scrape_interval: 15s
prometheus_evaluation_interval: 15s
prometheus_retention_time: 15d
grafana_repo_enabled: true