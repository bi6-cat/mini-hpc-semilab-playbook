# Cluster identity
cluster_name: hpc-semi-lab
domain_name: lab.local
timezone: Asia/Ho_Chi_Minh

# Admin
admin_user: ldapadmin
admin_group: ldapadmins

# OS Configuration
os_packages:
  - git
  - vim
  - curl
  - wget
  - htop
  - net-tools
  - openssh-clients
  - rsync
  - python3-pexpect
  - xorg-x11-xauth
  - xterm

# Network
dns_servers:
  - 8.8.8.8
  - 1.1.1.1

# Cluster network (used for NFS exports, etc.)
cluster_network_cidr: 192.168.56.0/24

# Identity backend (hard switch for new environment)
identity_backend: ldap

# LDAP
ldap_domain: "{{ domain_name }}"
ldap_base_dn: "dc=lab,dc=local"
ldap_uri: "ldap://head01.{{ domain_name }}"
ldap_bind_dn: "cn=Directory Manager"
ldap_bind_password: "{{ lookup('ansible.builtin.env', 'LDAP_BIND_PASSWORD') }}"
ldap_user_base: "ou=people,{{ ldap_base_dn }}"
ldap_group_base: "ou=groups,{{ ldap_base_dn }}"
ldap_sudo_base: "ou=sudoers,{{ ldap_base_dn }}"
ldap_tls_cacert: /etc/openldap/certs/ca.crt
ldap_ds_instance: hpc
ldap_ds_root_dn: "cn=Directory Manager"
ldap_ds_root_password: "{{ ldap_bind_password }}"

# LDAP SSH public key mapping
ldap_ssh_public_key_attr: sshPublicKey

# Storage
nfs_home: /home
nfs_proj: /proj
nfs_soft: /soft

# Slurm
slurm_cluster_name: HPC-LAB
slurm_state_dir: /var/spool/slurm/ctld
slurm_log_dir: /var/log/slurm

# SSH
ssh_port: 22

# Monitoring
node_exporter_port: 9100
slurm_exporter_port: 9341

# User Groups Configuration
user_groups:
  - name: lecture
    gid: 10001
    description: "Lecturers/Teachers Group"
    sudo_access: false
    login_nodes: ['login']
    login_cpu: 8
    login_mem_gb: 16
    compute_access: true
  - name: stu
    gid: 10002
    description: "Students Group"
    sudo_access: false
    login_nodes: ['login']
    login_cpu: 4
    login_mem_gb: 8
    compute_access: true
  - name: guest
    gid: 10003
    description: "Guest Users Group"
    sudo_access: false
    login_nodes: ['login']
    login_cpu: 2
    login_mem_gb: 4
    compute_access: false
