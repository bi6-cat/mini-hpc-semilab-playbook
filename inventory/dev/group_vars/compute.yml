slurm_node_type: compute

# SELinux: giữ permissive trên compute để tránh chặn Slurm job execution
# Chỉ nâng lên enforcing sau khi kiểm tra đủ audit log (audit2allow)(not recommend for lab environment).
selinux_state: permissive

# CPU/Memory configuration
cpu_cores: 16
memory_gb: 32     

# Slurm settings (đơn vị tính)
slurm_cpu_count: "{{ cpu_cores }}"
slurm_real_memory: "{{ memory_gb * 1024 }}"

# NFS mount points (NFSv3)
nfs_mounts:
  - path: "{{ nfs_home }}"
    server: storage01
    opts: "rw,hard,intr,nfsvers=3,tcp,rsize=1048576,wsize=1048576"
  - path: "{{ nfs_proj }}"
    server: storage01
    opts: "rw,hard,intr,nfsvers=3,tcp,rsize=1048576,wsize=1048576"
  - path: "{{ nfs_soft }}"
    server: storage01
    opts: "ro,hard,intr,nfsvers=3,tcp,rsize=1048576,wsize=1048576"