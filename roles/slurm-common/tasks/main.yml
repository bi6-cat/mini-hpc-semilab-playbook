---
# Slurm Common Tasks
# Setup shared configuration for all Slurm nodes

- name: "Include OS-specific variables"
  include_vars: "{{ ansible_os_family }}.yml"
  ignore_errors: true

- name: "Install EPEL repository"
  dnf:
    name: epel-release
    state: present

- name: "Install DNF plugins"
  dnf:
    name: dnf-plugins-core
    state: present

- name: "Enable PowerTools/CRB repository for Slurm dependencies"
  shell: |
    dnf config-manager --set-enabled powertools || dnf config-manager --set-enabled crb
  register: slurm_repo_enable
  changed_when: "'enabled' in (slurm_repo_enable.stdout | lower) or 'enabled' in (slurm_repo_enable.stderr | lower)"

- name: "Install development tools"
  dnf:
    name: "@Development Tools"
    state: present

- name: "Install Munge packages"
  dnf:
    name:
      - munge
      - munge-libs
    state: present

- name: "Install Slurm client packages"
  dnf:
    name: "{{ slurm_client_packages }}"
    state: present

- name: "Create Slurm group"
  group:
    name: "{{ slurm_group }}"
    gid: "{{ slurm_gid }}"
    state: present

- name: "Create Slurm user"
  user:
    name: "{{ slurm_user }}"
    uid: "{{ slurm_uid }}"
    group: "{{ slurm_group }}"
    system: yes
    shell: /bin/bash
    home: /var/lib/slurm
    createhome: yes
    comment: "Slurm Workload Manager"
    state: present

- name: "Create Slurm directories"
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0755'
  loop:
    - "{{ slurm_config_dir }}"
    - "{{ slurm_log_dir }}"
    - "{{ slurm_spool_dir }}"
    - "{{ slurm_run_dir }}"

- name: "Generate Munge key on controller"
  command: dd if=/dev/urandom bs=1 count=1024 of={{ munge_key_path }}
  args:
    creates: "{{ munge_key_path }}"
  when: inventory_hostname == slurm_control_machine
  become: yes

- name: "Set Munge key permissions on controller"
  file:
    path: "{{ munge_key_path }}"
    owner: "{{ munge_user }}"
    group: "{{ munge_group }}"
    mode: '0400'
  when: inventory_hostname == slurm_control_machine

- name: "Fetch Munge key from controller"
  fetch:
    src: "{{ munge_key_path }}"
    dest: "/tmp/munge.key"
    flat: yes
  when: inventory_hostname == slurm_control_machine
  become: yes

- name: "Distribute Munge key to all nodes"
  copy:
    src: "/tmp/munge.key"
    dest: "{{ munge_key_path }}"
    owner: "{{ munge_user }}"
    group: "{{ munge_group }}"
    mode: '0400'
  when: inventory_hostname != slurm_control_machine
  notify: restart munge

- name: "Enable and start Munge service"
  systemd:
    name: munge
    enabled: yes
    state: started

- name: "Test Munge authentication"
  shell: |
    munge -n | unmunge | grep -q STATUS
  register: munge_test
  failed_when: false
  changed_when: false

- name: "Verify Munge is working"
  assert:
    that:
      - munge_test.rc == 0
    fail_msg: "Munge authentication test failed"
    success_msg: "Munge authentication working correctly"

- name: "Configure firewall for Munge (on controller)"
  firewalld:
    port: "{{ item }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop:
    - "{{ slurm_slurmctld_port }}/tcp"
    - "{{ slurm_slurmdbd_port }}/tcp"
  when:
    - inventory_hostname == slurm_control_machine
    - ansible_facts.services['firewalld.service'] is defined
    - ansible_facts.services['firewalld.service'].state == 'running'
  ignore_errors: yes

- name: "Configure firewall for Slurmd (on compute nodes)"
  firewalld:
    port: "{{ slurm_slurmd_port }}/tcp"
    permanent: yes
    state: enabled
    immediate: yes
  when:
    - slurm_node_type == 'compute'
    - ansible_facts.services['firewalld.service'] is defined
    - ansible_facts.services['firewalld.service'].state == 'running'
  ignore_errors: yes
