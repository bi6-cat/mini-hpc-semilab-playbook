---
# Slurm Common Tasks
# Setup shared configuration for all Slurm nodes

- name: "Include OS-specific variables"
  include_vars: "{{ ansible_os_family }}.yml"
  ignore_errors: true

- name: "Download OpenHPC release RPM"
  ansible.builtin.get_url:
    url: "{{ slurm_ohpc_release_url }}"
    dest: /tmp/ohpc-release.rpm
    mode: '0644'

- name: "Install OpenHPC release package"
  ansible.builtin.dnf:
    name: /tmp/ohpc-release.rpm
    state: present
    disable_gpg_check: true

- name: "Install Munge packages"
  dnf:
    name:
      - munge
      - munge-libs
    state: present

- name: "Install Slurm common packages"
  dnf:
    name: "{{ slurm_packages }}"
    state: present

- name: "Create Slurm group"
  group:
    name: "{{ slurm_group }}"
    gid: "{{ slurm_gid }}"
    state: present

- name: "Create Slurm user"
  user:
    name: "{{ slurm_user }}"
    uid: "{{ slurm_uid }}"
    group: "{{ slurm_group }}"
    system: yes
    shell: /bin/bash
    home: /var/lib/slurm
    createhome: yes
    comment: "Slurm Workload Manager"
    state: present

- name: "Create Slurm directories"
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0755'
  loop:
    - "{{ slurm_config_dir }}"
    - "{{ slurm_log_dir }}"
    - "{{ slurm_spool_dir }}"
    - "{{ slurm_run_dir }}"

- name: "Check Munge key on controller"
  ansible.builtin.stat:
    path: "{{ munge_key_path }}"
  register: munge_controller_key_stat
  delegate_to: "{{ slurm_control_machine }}"
  run_once: true
  become: yes

- name: "Bootstrap Munge key on controller when missing"
  ansible.builtin.copy:
    dest: "{{ munge_key_path }}"
    content: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=' ~ (munge_key_seed_length | string)) }}"
    owner: "{{ munge_user }}"
    group: "{{ munge_group }}"
    mode: '0400'
  delegate_to: "{{ slurm_control_machine }}"
  run_once: true
  become: yes
  when: not munge_controller_key_stat.stat.exists

- name: "Set Munge key permissions on controller"
  ansible.builtin.file:
    path: "{{ munge_key_path }}"
    owner: "{{ munge_user }}"
    group: "{{ munge_group }}"
    mode: '0400'
  delegate_to: "{{ slurm_control_machine }}"
  run_once: true
  become: yes

- name: "Read Munge key from controller"
  ansible.builtin.slurp:
    src: "{{ munge_key_path }}"
  register: munge_key_blob
  delegate_to: "{{ slurm_control_machine }}"
  run_once: true
  become: yes

- name: "Distribute Munge key to all nodes"
  ansible.builtin.copy:
    content: "{{ munge_key_blob.content | b64decode }}"
    dest: "{{ munge_key_path }}"
    owner: "{{ munge_user }}"
    group: "{{ munge_group }}"
    mode: '0400'
  notify: restart munge

- name: "Cleanup legacy Munge staging file on control machine"
  ansible.builtin.file:
    path: "{{ munge_legacy_staging_path }}"
    state: absent
  delegate_to: localhost
  run_once: true
  become: false
  when: munge_cleanup_legacy_staging | bool

- name: "Enable and start Munge service"
  systemd:
    name: "{{ munge_service_name }}"
    enabled: yes
    state: started

- name: "Create a Munge token"
  ansible.builtin.command: munge -n
  register: munge_token
  changed_when: false
  failed_when: false

- name: "Decode Munge token"
  ansible.builtin.command: unmunge
  args:
    stdin: "{{ munge_token.stdout }}"
  register: munge_decode
  changed_when: false
  failed_when: false

- name: "Verify Munge is working"
  assert:
    that:
      - munge_token.rc == 0
      - munge_decode.rc == 0
      - "'STATUS:          Success (0)' in munge_decode.stdout"
    fail_msg: "Munge authentication test failed"
    success_msg: "Munge authentication working correctly"


