---
# Slurm Controller Configuration
# This role sets up the Slurm controller (slurmctld) and database (slurmdbd)

# Slurm controller packages
slurm_controller_packages:
  - slurm-slurmctld-ohpc
  - slurm-slurmdbd-ohpc
  - mariadb-server
  - mariadb
  - python3-PyMySQL

# MariaDB configuration (from group_vars/head.yml)

# Slurm database configuration
slurm_db_name: slurm_acct_db
slurm_db_user: slurm
slurm_db_host: localhost
slurm_db_port: 3306

# Slurmdbd configuration
slurmdbd_auth_type: "{{ slurm_auth_type }}"
slurmdbd_host: localhost
slurmdbd_port: "{{ slurm_slurmdbd_port }}"
slurmdbd_debug: info
slurmdbd_logfile: "{{ slurm_log_dir }}/slurmdbd.log"
slurmdbd_pidfile: "{{ slurm_run_dir }}/slurmdbd.pid"
slurmdbd_archive_events: "no"
slurmdbd_archive_jobs: "no"
slurmdbd_archive_steps: "no"
slurmdbd_purge_event: 12months
slurmdbd_purge_job: 12months
slurmdbd_purge_step: 1month

# Slurm accounts (mapped to user groups)
slurm_accounts:
  - name: lecture
    description: "Lecturers/Teachers Account"
    organization: "{{ cluster_name }}"
  - name: stu
    description: "Students Account"
    organization: "{{ cluster_name }}"
  - name: guest
    description: "Guest Users Account"
    organization: "{{ cluster_name }}"

# Service start order is important
# 1. MariaDB
# 2. Munge (from slurm-common)
# 3. Slurmdbd (must start before slurmctld)
# 4. Slurmctld
