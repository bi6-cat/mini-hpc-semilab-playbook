---
# Slurm Controller Tasks
# Setup Slurm controller daemon and accounting database

- name: "Install Slurm controller packages"
  dnf:
    name: "{{ slurm_controller_packages }}"
    state: present

- name: "Create Slurm state directory"
  file:
    path: "{{ slurm_state_dir }}"
    state: directory
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0755'

# ==================== MariaDB Setup ====================

- name: "Enable and start MariaDB service"
  systemd:
    name: mariadb
    enabled: yes
    state: started

- name: "Wait for MariaDB to be ready"
  wait_for:
    port: "{{ slurm_db_port }}"
    delay: 2
    timeout: 30

- name: "Check if MariaDB root can connect without password"
  command: mysql -u root -e "SELECT 1"
  register: mariadb_nopass_check
  changed_when: false
  failed_when: false
  no_log: true

- name: "Set MariaDB root password (first-time setup)"
  command: >
    mysql -u root -e
    "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mariadb_root_password }}'; FLUSH PRIVILEGES;"
  when: mariadb_nopass_check.rc == 0
  no_log: true

- name: "Write /root/.my.cnf for idempotent credential reuse"
  copy:
    dest: /root/.my.cnf
    content: |
      [client]
      user=root
      password={{ mariadb_root_password }}
    mode: '0600'
    owner: root
    group: root

- name: "Remove anonymous MariaDB users"
  community.mysql.mysql_user:
    name: ''
    host_all: yes
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    state: absent

- name: "Remove MariaDB test database"
  community.mysql.mysql_db:
    name: test
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    state: absent

- name: "Create Slurm accounting database"
  community.mysql.mysql_db:
    name: "{{ slurm_db_name }}"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_general_ci

- name: "Create Slurm database user"
  community.mysql.mysql_user:
    name: "{{ slurm_db_user }}"
    password: "{{ mariadb_slurm_password }}"
    priv: "{{ slurm_db_name }}.*:ALL"
    host: localhost
    login_user: root
    login_password: "{{ mariadb_root_password }}"
    state: present

- name: "Verify Slurm database user access"
  community.mysql.mysql_db:
    name: "{{ slurm_db_name }}"
    login_user: "{{ slurm_db_user }}"
    login_password: "{{ mariadb_slurm_password }}"
    state: present
  register: db_test
  failed_when: false

# ==================== Slurmdbd Configuration ====================

- name: "Deploy slurmdbd.conf"
  template:
    src: slurmdbd.conf.j2
    dest: "{{ slurm_config_dir }}/slurmdbd.conf"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: '0600'
  notify: restart slurmdbd

- name: "Deploy slurm.conf"
  template:
    src: slurm.conf.j2
    dest: "{{ slurm_config_dir }}/slurm.conf"
    owner: root
    group: root
    mode: '0644'
  notify:
    - restart slurmdbd
    - restart slurmctld

# ==================== Cgroups Configuration ====================

- name: "Create cgroup.conf for Slurm"
  copy:
    dest: "{{ slurm_config_dir }}/cgroup.conf"
    content: |
      # Slurm cgroup configuration
      # Generated by Ansible
      # Note: CgroupPlugin not available in Slurm < 21.08
      CgroupAutomount=yes
      ConstrainCores=yes
      ConstrainRAMSpace=yes
      ConstrainSwapSpace=yes
      ConstrainDevices=yes
    owner: root
    group: root
    mode: '0644'
  notify: restart slurmctld

# ==================== Enable and Start Services ====================

- name: "Enable and start Slurmdbd service"
  systemd:
    name: slurmdbd
    enabled: yes
    state: started
    daemon_reload: yes

- name: "Wait for Slurmdbd to be ready"
  wait_for:
    port: "{{ slurmdbd_port }}"
    delay: 3
    timeout: 30

- name: "Enable and start Slurmctld service"
  systemd:
    name: slurmctld
    enabled: yes
    state: started
    daemon_reload: yes

- name: "Wait for Slurmctld to be ready"
  wait_for:
    port: "{{ slurm_slurmctld_port }}"
    delay: 3
    timeout: 30

# ==================== Slurm Cluster Configuration ====================

- name: "Wait for Slurm cluster to initialize"
  pause:
    seconds: 5

- name: "Add cluster to Slurm accounting"
  command: >
    sacctmgr -i add cluster {{ slurm_cluster_name }}
  register: add_cluster
  failed_when: false
  changed_when: "'Adding Cluster' in add_cluster.stdout"

- name: "Create Slurm accounts for user groups"
  command: >
    sacctmgr -i add account {{ item.name }}
    Cluster={{ slurm_cluster_name }}
    Description="{{ item.description }}"
    Organization="{{ item.organization }}"
  loop: "{{ slurm_accounts }}"
  register: add_account
  failed_when: false
  changed_when: "'Adding Account' in add_account.stdout"

- name: "Create Slurm user associations (for LDAP users)"
  command: >
    sacctmgr -i add user name={{ item.user }}
    account={{ item.account }}
    cluster={{ slurm_cluster_name }}
    defaultaccount={{ item.account }}
  loop: "{{ slurm_user_account_mappings }}"
  register: add_user_assoc
  failed_when: false
  changed_when: "'Adding User' in add_user_assoc.stdout"
  when: slurm_user_account_mappings | length > 0

- name: "Grant Slurm operator rights to admin user"
  block:
    - name: "Create admin account in Slurm"
      command: >
        sacctmgr -i add account admin
        Cluster={{ slurm_cluster_name }}
        Description="HPC Admin Account"
        Organization="{{ cluster_name }}"
      register: slurm_admin_account
      failed_when: false
      changed_when: "'Adding Account' in slurm_admin_account.stdout"

    - name: "Add admin user to Slurm with AdminLevel=Admin"
      command: >
        sacctmgr -i add user {{ admin_user }}
        account=admin
        cluster={{ slurm_cluster_name }}
        AdminLevel=Admin
      register: slurm_admin_grant
      failed_when: false
      changed_when: "'Adding User' in slurm_admin_grant.stdout"

- name: "Verify Slurm controller status"
  command: scontrol ping
  register: slurm_ping
  failed_when: false
  changed_when: false

- name: "Display Slurm controller status"
  debug:
    msg: "{{ slurm_ping.stdout_lines }}"
  when: slurm_ping.rc == 0
