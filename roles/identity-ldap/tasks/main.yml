---
- name: Validate LDAP variable contract
  ansible.builtin.include_role:
    name: ldap-contract

- name: Install LDAP client tools on server
  ansible.builtin.dnf:
    name: "{{ identity_ldap_packages }}"
    state: present

- name: Render base LDAP objects LDIF
  ansible.builtin.template:
    src: base.ldif.j2
    dest: "{{ identity_ldap_base_ldif_path }}"
    owner: root
    group: root
    mode: "0600"

- name: Render user groups LDIF
  ansible.builtin.template:
    src: groups.ldif.j2
    dest: "{{ identity_ldap_groups_ldif_path }}"
    owner: root
    group: root
    mode: "0600"

# Cho phép cn admin đọc toàn bộ cây LDAP để xác thực người dùng và nhóm
- name: Setup ACI on base domain for access
  ansible.builtin.command: >-
    ldapmodify -x -H {{ ldap_server_uri }}
    -D "{{ ldap_directory_manager_dn }}"
    -w "{{ ldap_directory_manager_password }}"
  args:
    stdin: |
      dn: {{ ldap_base_dn }}
      changetype: modify
      add: aci
      aci: (targetattr="*")(version 3.0; acl "Allow admin read"; allow(all)(userdn="ldap:///{{ ldap_bind_dn }}");)
  register: __aci_add
  failed_when: __aci_add.rc not in [0, 20]
  changed_when: __aci_add.rc == 0

- name: Render LDAP test user LDIF
  ansible.builtin.template:
    src: test-user.ldif.j2
    dest: "{{ identity_ldap_test_user_ldif_path }}"
    owner: root
    group: root
    mode: "0600"

- name: Check if base structure exists
  ansible.builtin.command: >-
    ldapsearch -LLL -x -H {{ ldap_server_uri }}
    -D "{{ ldap_directory_manager_dn }}"
    -w "{{ ldap_directory_manager_password }}"
    -b "{{ ldap_user_base }}" -s base "(objectClass=*)" dn
  register: ldap_base_check
  changed_when: false
  failed_when: false

- name: Seed base LDAP objects (OUs, bind account, hpc-users group)
  ansible.builtin.command: >-
    ldapadd -x -H {{ ldap_server_uri }}
    -D "{{ ldap_directory_manager_dn }}"
    -w "{{ ldap_directory_manager_password }}"
    -f {{ identity_ldap_base_ldif_path }}
  when: ldap_base_check.rc != 0

- name: Seed user groups (skip existing entries)
  ansible.builtin.command: >-
    ldapadd -c -x -H {{ ldap_server_uri }}
    -D "{{ ldap_directory_manager_dn }}"
    -w "{{ ldap_directory_manager_password }}"
    -f {{ identity_ldap_groups_ldif_path }}
  register: ldap_groups_add
  changed_when: "'adding new entry' in ldap_groups_add.stdout"
  failed_when: ldap_groups_add.rc not in [0, 68]

- name: Check if test user exists
  ansible.builtin.command: >-
    ldapsearch -LLL -x -H {{ ldap_server_uri }}
    -D "{{ ldap_directory_manager_dn }}"
    -w "{{ ldap_directory_manager_password }}"
    -b "uid={{ ldap_test_user }},{{ ldap_user_base }}" -s base "(objectClass=*)" dn
  register: ldap_test_user_check
  changed_when: false
  failed_when: false

- name: Seed LDAP test user
  ansible.builtin.command: >-
    ldapadd -x -H {{ ldap_server_uri }}
    -D "{{ ldap_directory_manager_dn }}"
    -w "{{ ldap_directory_manager_password }}"
    -f {{ identity_ldap_test_user_ldif_path }}
  when: ldap_test_user_check.rc != 0

- name: Deploy user management scripts
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: '0755'
  loop: "{{ identity_ldap_user_scripts }}"
