---
- name: Validate LDAP bind password is provided
  ansible.builtin.assert:
    that:
      - ldap_directory_manager_password | length > 0
    fail_msg: "Set LDAP_BIND_PASSWORD before running playbook"

- name: Clean DNF cache
  command: dnf clean all

- name: Reset 389-ds module
  command: dnf module reset 389-ds -y

- name: Enable 389-ds 1.4 stream
  command: dnf module enable 389-ds:1.4 -y

- name: Install 389-ds server and client
  dnf:
    name:
      - 389-ds-base
      - openldap-clients
    state: latest

- name: Render DS instance config
  ansible.builtin.template:
    src: ds.inf.j2
    dest: /root/ds.inf
    owner: root
    group: root
    mode: "0600"

- name: Check if DS instance exists
  ansible.builtin.stat:
    path: "/etc/dirsrv/slapd-{{ ldap_ds_instance }}"
  register: ldap_ds_instance_stat

- name: Create DS instance
  ansible.builtin.command: dscreate from-file /root/ds.inf
  when: not ldap_ds_instance_stat.stat.exists

- name: Ensure LDAP service is enabled and started
  ansible.builtin.systemd:
    name: "dirsrv@{{ ldap_ds_instance }}"
    state: started
    enabled: true

- name: Wait for LDAP TCP port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ ldap_port }}"
    timeout: 60
