---
# Slurm Worker Configuration
# This role sets up Slurm compute nodes (slurmd)

# Slurm worker packages
slurm_worker_packages:
  - slurm-slurmd-ohpc

# Slurmd configuration
slurmd_debug: info
slurmd_logfile: "{{ slurm_log_dir }}/slurmd.log"
slurmd_spool_dir: "{{ slurm_slurmd_spool_dir }}"

# Cgroups configuration for resource management
# Note: CgroupPlugin/CgroupAutomount behaviour varies by Slurm version
# Slurm 20.11 (EL8/EPEL): uses CgroupAutomount, no CgroupPlugin
cgroup_constrain_cores: "yes"
cgroup_constrain_ram: "yes"
cgroup_constrain_swap: "yes"
cgroup_constrain_devices: "yes"
