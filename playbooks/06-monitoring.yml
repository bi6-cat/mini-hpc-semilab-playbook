---

- name: "Install Node Exporter on all cluster nodes"
  hosts: head,login,compute
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: "Verify network connectivity"
      ansible.builtin.ping:

  roles:
    - role: node-exporter
      tags: ['monitoring', 'exporter', 'node-exporter']


- name: "Install Prometheus and Grafana on head node"
  hosts: head
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: "Verify network connectivity"
      ansible.builtin.ping:

  roles:
    - role: prometheus-server
      tags: ['monitoring', 'prometheus']

    - role: grafana-server
      tags: ['monitoring', 'grafana']

  post_tasks:
    - name: "Check Prometheus service"
      ansible.builtin.systemd:
        name: prometheus
      register: prometheus_status
      changed_when: false

    - name: "Check Grafana service"
      ansible.builtin.systemd:
        name: grafana-server
      register: grafana_status
      changed_when: false

    - name: "Display monitoring services status"
      ansible.builtin.debug:
        msg:
          - "Prometheus: {{ prometheus_status.status.ActiveState | default('unknown') }}"
          - "Grafana: {{ grafana_status.status.ActiveState | default('unknown') }}"
