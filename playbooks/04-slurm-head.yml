---
# This playbook sets up the Slurm controller components on the head node:
#   - Munge authentication (shared with all nodes)
#   - MariaDB database for Slurm accounting
#   - Slurm Database Daemon (slurmdbd)
#   - Slurm Controller Daemon (slurmctld)
#   - Slurm cluster and account configuration
# 
# Prerequisites:
#   - 00-bootstrap.yml (OS setup, users)
#   - 02-storage.yml (NFS)

- name: "Install Slurm Controller on Head Node"
  hosts: head
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: "Pre-flight checks"
      block:
        - name: "Verify this is the head node"
          assert:
            that:
              - slurm_node_type == 'head'
            fail_msg: "This playbook must run on head node only"
            success_msg: "Running on head node: {{ inventory_hostname }}"

        - name: "Check network connectivity"
          wait_for:
            host: "{{ item }}"
            port: 22
            timeout: 10
          loop: "{{ groups['compute'] | default([]) | map('extract', hostvars, 'ansible_host') | list }}"
          ignore_errors: yes

  roles:
    - role: slurm-common
      tags: ['slurm', 'slurm-common', 'munge']

    - role: slurm-controller
      tags: ['slurm', 'slurm-controller', 'slurmctld']

  post_tasks:
    - name: "Post-installation verification"
      block:
        - name: "Check Munge service"
          systemd:
            name: munge
          register: munge_status

        - name: "Check MariaDB service"
          systemd:
            name: mariadb
          register: mariadb_status

        - name: "Check Slurmdbd service"
          systemd:
            name: slurmdbd
          register: slurmdbd_status

        - name: "Check Slurmctld service"
          systemd:
            name: slurmctld
          register: slurmctld_status

        - name: "Display services status"
          debug:
            msg:
              - "Munge: {{ munge_status.status.ActiveState }}"
              - "MariaDB: {{ mariadb_status.status.ActiveState }}"
              - "Slurmdbd: {{ slurmdbd_status.status.ActiveState }}"
              - "Slurmctld: {{ slurmctld_status.status.ActiveState }}"

        - name: "Verify Slurm cluster"
          command: scontrol show config
          register: slurm_config
          changed_when: false
          failed_when: false

        - name: "List Slurm accounts"
          command: sacctmgr -n list account
          register: slurm_accounts_list
          changed_when: false
          failed_when: false

  handlers:
    - name: restart firewalld
      systemd:
        name: firewalld
        state: restarted
