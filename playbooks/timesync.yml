---
# Đồng bộ time toàn cụm
# - Head node đồng bộ với upstream NTP qua IP (bỏ qua DNS)
# - Các node còn lại dùng head node làm NTP server nội bộ

# ─── BƯỚC 1: Cấu hình head node làm NTP server nội bộ ────────────────────────
- name: "Timesync | Configure head node as cluster NTP server"
  hosts: head
  become: true
  gather_facts: false

  vars:
    # Dùng IP trực tiếp để tránh phụ thuộc DNS
    upstream_ntp_ips:
      - 216.239.35.0    # time.google.com
      - 216.239.35.4    # time.google.com
      - 162.159.200.1   # time.cloudflare.com
    cluster_network: "{{ cluster_network_cidr }}"

  tasks:
    - name: Ensure chrony is installed
      ansible.builtin.dnf:
        name: chrony
        state: present

    - name: Build chrony.conf for head (upstream via IP + serve cluster)
      ansible.builtin.copy:
        dest: /etc/chrony.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          # === Managed by Ansible – timesync.yml ===
          # Upstream NTP servers (by IP – no DNS required)
          {% for ip in upstream_ntp_ips %}
          server {{ ip }} iburst
          {% endfor %}

          # Drift file
          driftfile /var/lib/chrony/drift

          # Allow NTP client access from cluster network
          allow {{ cluster_network }}

          # Serve time even if not synced (stratum 10 fallback)
          local stratum 10

          # Log files
          logdir /var/log/chrony
          log tracking measurements statistics

          # Step clock if offset > 1 s (first 3 updates)
          makestep 1.0 3

          # Hardware timestamping
          rtcsync
      notify: Restart chronyd

    - name: Enable and start chronyd
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true

    - name: Open NTP port on firewall (if firewalld active)
      ansible.posix.firewalld:
        service: ntp
        permanent: true
        state: enabled
        immediate: true
      ignore_errors: true

    - name: Force immediate time step on head node
      ansible.builtin.command: chronyc makestep
      changed_when: true

    - name: Wait for head node to sync (up to 30 s)
      ansible.builtin.command: chronyc waitsync 6 0.1
      register: waitsync_result
      failed_when: waitsync_result.rc not in [0, 1]
      changed_when: false

    - name: Show tracking on head node
      ansible.builtin.command: chronyc tracking
      register: head_tracking
      changed_when: false

    - name: Print head node tracking
      ansible.builtin.debug:
        var: head_tracking.stdout_lines

  handlers:
    - name: Restart chronyd
      ansible.builtin.systemd:
        name: chronyd
        state: restarted

# ─── BƯỚC 2: Cấu hình các node còn lại dùng head node ────────────────────────
- name: "Timesync | Configure worker nodes to use head node as NTP server"
  hosts: compute,login,storage
  become: true
  gather_facts: false

  vars:
    head_host: "{{ (groups['head'] | first) }}"
    head_ip: "{{ hostvars[head_host]['ansible_host'] | default(head_host) }}"

  tasks:
    - name: Ensure chrony is installed
      ansible.builtin.dnf:
        name: chrony
        state: present

    - name: Build chrony.conf pointing to head node
      ansible.builtin.copy:
        dest: /etc/chrony.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          # === Managed by Ansible – timesync.yml ===
          # NTP server = head node (internal cluster)
          server {{ head_ip }} iburst prefer

          # Drift file
          driftfile /var/lib/chrony/drift

          # Step clock if offset > 1 s (first 3 updates)
          makestep 1.0 3

          # Log files
          logdir /var/log/chrony
          log tracking measurements statistics

          rtcsync
      notify: Restart chronyd

    - name: Enable and start chronyd
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true

    - name: Force immediate time step
      ansible.builtin.command: chronyc makestep
      changed_when: true

    - name: Wait for node to sync with head node (up to 30 s)
      ansible.builtin.command: chronyc waitsync 6 0.1
      register: waitsync_result
      failed_when: waitsync_result.rc not in [0, 1]
      changed_when: false

    - name: Show tracking info
      ansible.builtin.command: chronyc tracking
      register: node_tracking
      changed_when: false

    - name: Print tracking
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ node_tracking.stdout_lines }}"

  handlers:
    - name: Restart chronyd
      ansible.builtin.systemd:
        name: chronyd
        state: restarted

# ─── BƯỚC 3: Báo cáo tổng hợp ────────────────────────────────────────────────
- name: "Timesync | Summary report"
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Collect chronyc sources
      ansible.builtin.command: chronyc sources -v
      register: sources_out
      changed_when: false

    - name: Print sources per node
      ansible.builtin.debug:
        msg: |
          === {{ inventory_hostname }} ===
          {{ sources_out.stdout }}
