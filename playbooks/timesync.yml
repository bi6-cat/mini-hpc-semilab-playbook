---
- name: "Timesync is integrated into bootstrap"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Inform deprecated workflow
      ansible.builtin.fail:
        msg: >-
          playbooks/timesync.yml is deprecated. Time synchronization is now integrated
          in playbooks/00-bootstrap.yml via role common. Please run:
          ansible-playbook -i inventory/dev/hosts.yml playbooks/00-bootstrap.yml
