- name: 01 - Setup LDAP Server
  hosts: head
  gather_facts: true
  become: true

  pre_tasks:
    - name: Verify network connectivity
      ansible.builtin.ping:

    - name: Verify Rocky Linux 8
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Rocky"
          - ansible_distribution_major_version == "8"
        fail_msg: "Requires Rocky Linux 8"

  roles:
    - ldap-server
    - identity-ldap

  post_tasks:
    - name: LDAP server status
      ansible.builtin.command: systemctl is-active dirsrv@{{ ldap_ds_instance }}
      register: ldap_status
      changed_when: false
      failed_when: false

    - name: Display LDAP status
      ansible.builtin.debug:
        msg: "LDAP service state: {{ ldap_status.stdout | default('unknown') }}"

- name: 01 - Setup LDAP Clients
  hosts: head,storage,login,compute
  gather_facts: true
  become: true
  serial: 1

  pre_tasks:
    - name: Wait for LDAP server
      ansible.builtin.wait_for:
        host: "{{ ldap_server_host }}"
        port: "{{ ldap_port }}"
        timeout: 300

  roles:
    - ldap-client

  post_tasks:
    - name: Verify SSSD can resolve LDAP test user
      ansible.builtin.command: id {{ ldap_test_user }}
      register: ldap_sssd_test
      changed_when: false
      failed_when: false

    - name: LDAP client status
      ansible.builtin.debug:
        msg:
          - "-- {{ inventory_hostname }} configured for LDAP"
          - "-- SSSD lookup: {{ 'OK' if ldap_sssd_test.rc == 0 else 'Pending' }}"