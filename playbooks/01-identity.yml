- name: 01 - Setup LDAP Server
  hosts: head
  gather_facts: true
  become: true

  pre_tasks:
    - name: Verify network connectivity
      ansible.builtin.ping:

    - name: Check hostname resolution
      ansible.builtin.command: hostname -f
      register: fqdn_check
      changed_when: false

  roles:
    - ldap-server
    - identity-ldap
    - user-privacy

  post_tasks:
    - name: LDAP server status
      ansible.builtin.command: systemctl is-active dirsrv@instance
      register: ldap_status
      changed_when: false
      failed_when: false

    - name: Display LDAP status
      ansible.builtin.debug:
        msg: "LDAP service state: {{ ldap_status.stdout | default('unknown') }}"

- name: 01 - Setup LDAP Clients
  hosts: storage,login,compute
  gather_facts: true
  become: true
  serial: 1

  pre_tasks:
    - name: Wait for LDAP server
      ansible.builtin.wait_for:
        host: "{{ groups['head'][0] }}.{{ domain_name }}"
        port: 636
        timeout: 300

  roles:
    - ldap-client
    - user-privacy

  post_tasks:
    - name: Verify SSSD can resolve admin user
      ansible.builtin.command: id {{ admin_user }}
      register: ldap_sssd_test
      changed_when: false
      failed_when: false

    - name: LDAP client status
      ansible.builtin.debug:
        msg:
          - "-- {{ inventory_hostname }} configured for LDAP"
          - "-- SSSD: {{ 'OK' if ldap_sssd_test.rc == 0 else 'Pending' }}"
